<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recharge Plans</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="pricing">
  <h1>Our Recharge Plans</h1>

  <div class="cards">
    <div class="card">
      <h2>Basic</h2>
      <p class="price">₹39</p>
      <ul>
        <li>3GB Data/Day</li>
        <li>SMS 100/Day</li>
        <li>3 Days Validity</li>        
      </ul>
      <a href="#" class="btn">Choose Plan</a>
    </div>

    <div class="card popular">
      <span class="badge">Most Popular</span>
      <h2>Pro</h2>
      <p class="price">₹361</p>
      <ul>
        <li>50GB Data</li>
        <li>Talktime Unlimited</li>
        <li>90 Days Validity</li>        
      </ul>
      <a href="#" class="btn">Choose Plan</a>
    </div>

    <div class="card">
      <h2>Premium</h2>
      <p class="price">₹161</p>
      <ul>
        <li>12GB Data</li>
        <li>Talktime 100min/Day</li>
        <li>30 Days Validity</li>
      </ul>
      <a href="#" class="btn">Choose Plan</a>
    </div>
  </div>
</section>

</body>
</html>
